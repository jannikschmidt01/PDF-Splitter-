<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>PDF Splitter</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#111116;--sur:#1c1c24;--sur2:#24242e;--bdr:#2e2e3a;--txt:#e4e2dc;--mut:#666;--or:#ff6b35}
body.light{--bg:#f4f4f8;--sur:#ffffff;--sur2:#f0f0f5;--bdr:#dddde8;--txt:#1a1a2e;--mut:#999;--or:#ff6b35}
body{background:var(--bg);color:var(--txt);font-family:'Outfit',system-ui,sans-serif;font-size:14px;transition:background .2s,color .2s}
header{padding:16px 24px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:12px}
header h1{font-size:18px;font-weight:700;color:var(--or)}
header small{color:var(--mut);font-size:11px}
#drop{
  margin:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:calc(100vh - 53px);
  cursor:pointer;
  background:var(--bg);
  transition:all .2s;
}
#drop:hover,#drop.over{background:color-mix(in srgb, var(--or) 4%, var(--bg));}
#drop.over .dz-box{border-color:var(--or);}
.dz-box{
  border:2px dashed var(--bdr);border-radius:20px;
  padding:60px 80px;text-align:center;
  background:var(--sur);
  transition:border-color .2s;
  max-width:460px;width:90%;
}
.dz-icon{font-size:48px;margin-bottom:20px;display:block;}
.dz-title{font-size:22px;font-weight:700;margin-bottom:8px;color:var(--txt)}
.dz-sub{color:var(--mut);font-size:13px}
.dz-name{margin-top:28px;font-size:11px;color:var(--mut)}
#loading{display:none;text-align:center;padding:60px 0}
.spin{display:inline-block;font-size:30px;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#status{color:var(--mut);margin-top:10px;font-size:13px}
#bar-wrap{max-width:300px;margin:10px auto 0;background:var(--sur2);border-radius:4px;height:6px;overflow:hidden}
#bar{height:100%;background:var(--or);width:0%;transition:width .15s;border-radius:4px}
#editor{display:none}
.layout{display:flex;height:calc(100vh - 53px)}
#side{width:230px;min-width:230px;background:var(--sur);border-right:1px solid var(--bdr);display:flex;flex-direction:column}
.sh{padding:12px 16px;border-bottom:1px solid var(--bdr)}
.sfname{font-weight:600;font-size:12px;color:var(--or);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.smeta{font-size:11px;color:var(--mut);margin-top:3px}
.ssec{padding:10px 16px;border-bottom:1px solid var(--bdr)}
.slbl{font-size:10px;color:var(--mut);letter-spacing:1px;text-transform:uppercase;margin-bottom:7px}
.crow{display:flex;align-items:center;gap:8px}
.crow button{background:var(--sur2);color:var(--txt);border:1px solid var(--bdr);border-radius:6px;width:28px;height:28px;font-size:16px;cursor:pointer}
.crow button:hover:not(:disabled){background:var(--bdr)}
.crow button:disabled{opacity:.3;cursor:default}
.cval{font-size:22px;font-weight:700;color:var(--or);min-width:28px;text-align:center}
#slots{flex:1;overflow-y:auto;padding:6px 0}
.slot{display:flex;align-items:center;gap:8px;padding:8px 16px;border-left:3px solid transparent;transition:background .1s}
.slot:hover{background:var(--sur2)}
.slot.has{border-left-color:var(--sc)}
.sdot{width:12px;height:12px;border-radius:50%;background:var(--sc);flex-shrink:0}
.sinfo{flex:1}
.sname{font-size:12px;font-weight:600}
.sname-input{font-size:12px;font-weight:600;background:transparent;border:none;border-bottom:1px solid transparent;color:var(--txt);width:100%;outline:none;cursor:text;font-family:inherit}
.sname-input:hover{border-bottom-color:var(--bdr)}
.sname-input:focus{border-bottom-color:var(--sc);background:var(--sur2);border-radius:3px 3px 0 0;padding:0 3px}
.scnt{font-size:11px;color:var(--mut)}
.saa{background:none;border:1px solid var(--sc);color:var(--sc);font-size:10px;padding:2px 6px;border-radius:10px;cursor:pointer;opacity:.7}
.saa:hover{opacity:1}
.sdl{background:none;border:none;cursor:pointer;color:var(--sc);font-size:16px;padding:2px;opacity:.6}
.sdl:hover{opacity:1}
.sdl:disabled{opacity:.2;cursor:default}
.sbtns{padding:12px 16px;border-top:1px solid var(--bdr);display:flex;flex-direction:column;gap:7px}
.btn{border:none;cursor:pointer;border-radius:8px;font-size:13px;font-weight:600;padding:10px;width:100%;transition:all .15s}
.btn:hover:not(:disabled){filter:brightness(1.12)}
.btn:disabled{opacity:.35;cursor:default}
.bmake{background:var(--or);color:#000}
.bdlall{background:#1a3a2a;color:#4ade80;border:1px solid #2a5a3a}
.bzip{background:#1a2a3a;color:#60a5fa;border:1px solid #2a3a5a}
.bghost{background:var(--sur2);color:var(--mut);font-weight:400;font-size:12px}
#grid-wrap{flex:1;overflow-y:auto;padding:16px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:12px;flex-wrap:wrap}
.topbar-left{display:flex;align-items:center;gap:10px;font-size:11px;color:var(--mut)}
.topbar-left input[type=range]{width:90px;accent-color:var(--or)}
.topbar-right{display:flex;gap:8px}
.tbtn{background:var(--sur2);border:1px solid var(--bdr);color:var(--txt);border-radius:6px;padding:4px 12px;cursor:pointer;font-size:11px;white-space:nowrap}
.tbtn.off{color:var(--mut)}
#grid{display:grid;gap:14px}
.pc{display:flex;flex-direction:column;gap:5px}
.pt{border-radius:7px;border:2px solid var(--bdr);overflow:hidden;background:var(--sur2);position:relative;transition:all .15s;cursor:zoom-in}
.pt:hover{box-shadow:0 4px 16px rgba(0,0,0,.5)}
.pt.on{border-color:var(--ac)}
/* greyed out when assigned */
.pt.on img{opacity:0.45}
.pt.on .pn{opacity:0.5}
.pt img{width:100%;display:block;pointer-events:none;transition:opacity .15s}
.pb{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:var(--ac);color:#000;font-size:10px;font-weight:700;display:none;align-items:center;justify-content:center;z-index:2}
.pt.on .pb{display:flex}
/* big checkmark overlay when assigned */
.pt.on::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,0.18);pointer-events:none}
/* assign animation */
@keyframes assignPop{0%{transform:scale(1)}40%{transform:scale(1.06)}100%{transform:scale(1)}}
.pt.pop{animation:assignPop .25s ease}
/* clear slot button */
.sclear{background:none;border:none;cursor:pointer;color:var(--mut);font-size:13px;padding:2px;opacity:0.5;line-height:1}
.sclear:hover{opacity:1;color:#e06c75}
.pn{padding:3px 0;font-size:10px;color:var(--mut);text-align:center;border-top:1px solid var(--bdr);background:var(--sur);transition:opacity .15s}
.dr{display:flex;justify-content:center;gap:4px;flex-wrap:wrap}
.cd{width:20px;height:20px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .1s;flex-shrink:0;font-size:10px;font-weight:700;color:#000;display:flex;align-items:center;justify-content:center;}
.cd:hover{transform:scale(1.3)}
.cd.on{border-color:#fff;box-shadow:0 0 0 2px var(--dc)}
#pv{display:none;position:fixed;z-index:9999;pointer-events:none}
#pv.show{display:block}
#pvbox{background:var(--sur);border:2px solid #555;border-radius:10px;box-shadow:0 20px 50px rgba(0,0,0,.8);overflow:hidden;width:260px;animation:pop .12s ease}
@keyframes pop{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
#pvimg{width:100%;display:block}
#pvfoot{padding:6px 10px;font-size:11px;color:var(--mut);border-top:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center}
#pvtag{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;color:#000}
</style>
</head>
<body>

<div id="pv"><div id="pvbox"><img id="pvimg" src="" alt=""><div id="pvfoot"><span id="pvlbl">–</span><span id="pvtag" style="display:none"></span></div></div></div>

<header>
  <h1>📄 PDF Splitter</h1>
  <small style="flex:1">Lokal · keine Daten verlassen deinen PC</small>
  <button onclick="toggleTheme()" id="themebtn" style="background:var(--sur2);border:1px solid var(--bdr);color:var(--txt);border-radius:6px;padding:5px 12px;cursor:pointer;font-size:12px">🌙 Dunkel</button>
</header>

<div id="drop" onclick="document.getElementById('fi').click()" ondragover="doDragOver(event)" ondragleave="doDragLeave(event)" ondrop="doDrop(event)">
  <div class="dz-box">
    <span class="dz-icon">📄</span>
    <div class="dz-title">PDF hier ablegen</div>
    <div class="dz-sub">oder klicken zum Auswählen</div>
    <div class="dz-name">Ein Tool von Jannik Schmidt &nbsp;·&nbsp; v1.0</div>
  </div>
  <input id="fi" type="file" accept=".pdf" hidden onchange="loadFile(this.files[0])">
</div>

<div id="loading">
  <div class="spin">⟳</div>
  <p id="status">Lade…</p>
  <div id="bar-wrap"><div id="bar"></div></div>
</div>

<div id="editor">
  <div class="layout">
    <div id="side">
      <div class="sh">
        <div style="font-size:10px;color:var(--mut);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">Ein Tool von</div>
        <div style="font-weight:700;font-size:13px;color:var(--txt)">Jannik Schmidt</div>
        <div style="font-size:10px;color:var(--mut);margin-top:3px">v1.0</div>
        <div class="sfname" id="fname" style="margin-top:6px">–</div>
        <div class="smeta" id="fmeta">–</div>
      </div>
      <div class="ssec">
        <div class="slbl">Anzahl PDFs</div>
        <div class="crow">
          <button onclick="setCount(cnt-1)" id="cminus">−</button>
          <span class="cval" id="cval">3</span>
          <button onclick="setCount(cnt+1)" id="cplus">+</button>
          <span style="font-size:10px;color:var(--mut)">max 15</span>
        </div>
      </div>
      <div class="ssec">
        <div class="slbl">Auto-Split</div>
        <div style="font-size:11px;color:var(--mut);margin-bottom:8px">Automatisch aufteilen & als ZIP</div>
        <select id="autosplit-sel" style="width:100%;background:var(--sur2);border:1px solid var(--bdr);color:var(--txt);border-radius:6px;font-size:12px;padding:6px 8px;cursor:pointer;margin-bottom:8px">
          <optgroup label="Nach Seitenanzahl">
            <option value="1">Jede Seite</option>
            <option value="2">Je 2 Seiten</option>
            <option value="3">Je 3 Seiten</option>
            <option value="4">Je 4 Seiten</option>
            <option value="5">Je 5 Seiten</option>
            <option value="10">Je 10 Seiten</option>
          </optgroup>
          <optgroup label="Gerade / Ungerade">
            <option value="odd">Nur ungerade Seiten</option>
            <option value="even">Nur gerade Seiten</option>
            <option value="odd_even">Ungerade + Gerade (2 PDFs)</option>
          </optgroup>
          <optgroup label="Hälften">
            <option value="half">Erste Hälfte / Zweite Hälfte</option>
            <option value="thirds">In 3 gleiche Teile</option>
          </optgroup>
        </select>
        <button class="btn" style="background:#1a2a3a;color:#60a5fa;border:1px solid #2a3a5a;font-size:12px;padding:8px" onclick="autoSplit()">Aufteilen & ZIP</button>
      </div>
      <div class="ssec" style="padding-bottom:4px"><div class="slbl">PDF-Gruppen</div></div>
      <div id="slots"></div>
      <div class="sbtns">
        <button class="btn bmake" id="btnmake" disabled onclick="makePDFs()">▶ PDFs erstellen</button>
        <button class="btn bdlall" id="btndlall" disabled onclick="dlAll()">⬇ Alle herunterladen</button>
        <button class="btn bzip" id="btnzip" disabled onclick="dlZip()">📦 Als ZIP herunterladen</button>
        <button class="btn bghost" onclick="doReset()">Neue Datei</button>
      </div>
    </div>
    <div id="grid-wrap">
      <div class="topbar">
        <div class="topbar-left">
          🔍 Größe:
          <input type="range" id="zoom" min="100" max="500" value="180" oninput="setZoom(this.value)">
          <span id="zoomval">180px</span>
        </div>
        <div class="topbar-right">
          <button class="tbtn" id="undobtn" onclick="undo()" disabled>↩ Rückgängig</button>
          <button class="tbtn" id="pvtoggle" onclick="togglePreview()">Vorschau: AN</button>
        </div>
      </div>
      <div id="grid"></div>
    </div>
  </div>
</div>

<script>
const COLORS=['#FF3B30','#34C759','#007AFF','#FF9500','#AF52DE','#FF2D55','#00C7BE','#FFCC00','#5856D6','#30B0C7','#FF6B35','#A2845E','#32ADE6','#FF375F','#30D158'];
const NAMES=Array.from({length:15},(_,i)=>'PDF '+(i+1));
let pages=[],asgn={},cnt=3,dlStore={},rawBytes=null,pdfjsLib=null,PDFLib=null,pvEnabled=true,zoomSize=180,history=[];

function undo(){
  if(!history.length)return;
  asgn=history.pop();
  renderGrid();updateMeta();updateSlots();updateBtns();
  document.getElementById('undobtn').disabled=history.length===0;
}

function toggleTheme(){
  const light=document.body.classList.toggle('light');
  document.getElementById('themebtn').textContent=light?'🌙 Dunkel':'☀️ Hell';
}

function setZoom(v){
  zoomSize=parseInt(v);
  document.getElementById('zoomval').textContent=v+'px';
  // preserve scroll position
  const wrap=document.getElementById('grid-wrap');
  const scrollRatio=wrap.scrollTop/(wrap.scrollHeight||1);
  document.getElementById('grid').style.gridTemplateColumns=`repeat(auto-fill,minmax(${v}px,1fr))`;
  // restore scroll position after reflow
  requestAnimationFrame(()=>{
    wrap.scrollTop=scrollRatio*wrap.scrollHeight;
  });
  // auto disable preview when zoom is large
  if(zoomSize>=250 && pvEnabled){
    pvEnabled=false;pvHide();
    document.getElementById('pvtoggle').textContent='Vorschau: AUS';
    document.getElementById('pvtoggle').classList.add('off');
  } else if(zoomSize<250 && !pvEnabled){
    pvEnabled=true;
    document.getElementById('pvtoggle').textContent='Vorschau: AN';
    document.getElementById('pvtoggle').classList.remove('off');
  }
}
function togglePreview(){
  pvEnabled=!pvEnabled;
  const btn=document.getElementById('pvtoggle');
  btn.textContent='Vorschau: '+(pvEnabled?'AN':'AUS');
  btn.classList.toggle('off',!pvEnabled);
  if(!pvEnabled)pvHide();
}

async function loadLibs(){
  if(pdfjsLib&&PDFLib)return true;
  try{
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
    pdfjsLib=window['pdfjs-dist/build/pdf']||window.pdfjsLib||window.PDFJS;
    if(!pdfjsLib)throw new Error('pdfjs not found');
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js');
    PDFLib=window.PDFLib;
    if(!PDFLib)throw new Error('pdflib not found');
    return true;
  }catch(e){return false;}
}
function loadScript(src){
  return new Promise((res,rej)=>{
    const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;
    document.head.appendChild(s);
  });
}

function doDragOver(e){e.preventDefault();document.getElementById('drop').classList.add('over');}
function doDragLeave(e){document.getElementById('drop').classList.remove('over');}
function doDrop(e){e.preventDefault();doDragLeave(e);const f=e.dataTransfer.files[0];if(f)loadFile(f);}

async function loadFile(file){
  if(!file||file.type!=='application/pdf'){alert('Bitte eine .pdf Datei wählen');return;}
  show('loading');hide('drop');
  document.getElementById('status').textContent='Lade Bibliotheken…';
  const ok=await loadLibs();
  if(!ok){alert('Fehler: Internetverbindung nötig (einmalig für Bibliotheken).');hide('loading');show('drop');return;}
  const fileBytes=await file.arrayBuffer();
  rawBytes=fileBytes.slice(0);
  const pdf=await pdfjsLib.getDocument({data:fileBytes}).promise;
  pages=[];asgn={};dlStore={};
  const total=pdf.numPages;
  for(let i=1;i<=total;i++){
    document.getElementById('status').textContent=`Lade Seite ${i} von ${total}…`;
    document.getElementById('bar').style.width=(i/total*100)+'%';
    const pg=await pdf.getPage(i);
    const vs=pg.getViewport({scale:0.9}),cs=document.createElement('canvas');
    cs.width=vs.width;cs.height=vs.height;
    await pg.render({canvasContext:cs.getContext('2d'),viewport:vs}).promise;
    const vm=pg.getViewport({scale:1.4}),cm=document.createElement('canvas');
    cm.width=vm.width;cm.height=vm.height;
    await pg.render({canvasContext:cm.getContext('2d'),viewport:vm}).promise;
    pages.push({n:i,sm:cs.toDataURL('image/jpeg',0.75),lg:cm.toDataURL('image/jpeg',0.85)});
  }
  document.getElementById('fname').textContent=file.name;
  updateMeta();renderSlots();renderGrid();
  setZoom(zoomSize);
  hide('loading');show('editor');
}

function setCount(n){
  n=Math.max(2,Math.min(15,n));cnt=n;
  document.getElementById('cval').textContent=n;
  document.getElementById('cminus').disabled=n<=2;
  document.getElementById('cplus').disabled=n>=15;
  Object.keys(asgn).forEach(k=>{if(asgn[k]>=n)delete asgn[k];});
  renderSlots();renderGrid();updateMeta();updateBtns();
}

function doAssign(pn,idx){
  history.push({...asgn});
  if(history.length>30)history.shift();
  document.getElementById('undobtn').disabled=false;
  if(asgn[pn]===idx)delete asgn[pn];else asgn[pn]=idx;
  updateMeta();updateCard(pn);updateSlots();updateBtns();
  // animation
  const th=document.querySelector('#card'+pn+' .pt');
  if(th){th.classList.remove('pop');void th.offsetWidth;th.classList.add('pop');}
}
function clearSlot(idx){
  history.push({...asgn});
  if(history.length>30)history.shift();
  document.getElementById('undobtn').disabled=false;
  Object.keys(asgn).forEach(k=>{if(asgn[k]===idx)delete asgn[k];});
  renderGrid();updateMeta();updateSlots();updateBtns();
}
async function autoSplit(){
  if(!pages.length||!rawBytes)return;
  const btn=event.target;
  btn.disabled=true;btn.textContent='Erstelle…';
  try{
    const mode=document.getElementById('autosplit-sel').value;
    const {PDFDocument}=PDFLib;
    const src=await PDFDocument.load(rawBytes,{ignoreEncryption:true});
    const total=pages.length;
    const files=[];

    async function makePart(pageNums, name){
      const nd=await PDFDocument.create();
      const cp=await nd.copyPages(src,pageNums.map(n=>n-1));
      cp.forEach(p=>nd.addPage(p));
      files.push({name:name+'.pdf', data:new Uint8Array(await nd.save())});
    }

    if(mode==='odd'){
      await makePart(pages.filter(p=>p.n%2!==0).map(p=>p.n),'Ungerade_Seiten');
    } else if(mode==='even'){
      await makePart(pages.filter(p=>p.n%2===0).map(p=>p.n),'Gerade_Seiten');
    } else if(mode==='odd_even'){
      await makePart(pages.filter(p=>p.n%2!==0).map(p=>p.n),'Ungerade_Seiten');
      await makePart(pages.filter(p=>p.n%2===0).map(p=>p.n),'Gerade_Seiten');
    } else if(mode==='half'){
      const mid=Math.ceil(total/2);
      await makePart(pages.slice(0,mid).map(p=>p.n),`Seiten_1-${mid}`);
      await makePart(pages.slice(mid).map(p=>p.n),`Seiten_${mid+1}-${total}`);
    } else if(mode==='thirds'){
      const t1=Math.ceil(total/3), t2=Math.ceil(2*total/3);
      await makePart(pages.slice(0,t1).map(p=>p.n),`Teil_1`);
      await makePart(pages.slice(t1,t2).map(p=>p.n),`Teil_2`);
      await makePart(pages.slice(t2).map(p=>p.n),`Teil_3`);
    } else {
      const n=parseInt(mode);
      for(let i=0;i<total;i+=n){
        const chunk=pages.slice(i,i+n);
        const from=chunk[0].n, to=chunk[chunk.length-1].n;
        const name=n===1?`Seite_${from}`:`Seiten_${from}-${to}`;
        await makePart(chunk.map(p=>p.n),name);
      }
    }

    const zip=makeZip(files);
    triggerDL(zip,'Auto-Split.zip','application/zip');
  }catch(e){alert('Fehler: '+e.message);}
  btn.disabled=false;btn.textContent='Aufteilen & ZIP';
}

function globalQuickAssign(val){
  if(!val||!pages.length)return;
  if(val==='clear'){history.push({...asgn});asgn={};renderGrid();updateMeta();updateSlots();updateBtns();document.getElementById('undobtn').disabled=false;return;}
  const[mode,idxStr]=val.split('_');
  const idx=parseInt(idxStr);
  quickAssign(idx,mode);
}

function quickAssign(idx,mode){
  if(!pages.length)return;
  history.push({...asgn});
  if(history.length>30)history.shift();
  document.getElementById('undobtn').disabled=false;
  if(mode==='all') pages.forEach(p=>asgn[p.n]=idx);
  else if(mode==='odd') pages.forEach(p=>{if(p.n%2!==0)asgn[p.n]=idx;});
  else if(mode==='even') pages.forEach(p=>{if(p.n%2===0)asgn[p.n]=idx;});
  else if(mode==='every2') pages.forEach((p,i)=>{if(i%2===0)asgn[p.n]=idx;});
  else if(mode==='every3') pages.forEach((p,i)=>{if(i%3===0)asgn[p.n]=idx;});
  renderGrid();updateMeta();updateSlots();updateBtns();
}

function renderSlots(){
  let h='';
  for(let i=0;i<cnt;i++){
    const c=COLORS[i];
    h+=`<div class="slot" id="slot${i}" style="--sc:${c}">
      <div class="sdot"></div>
      <div class="sinfo">
        <input class="sname-input" id="sname${i}" style="--sc:${c}" value="PDF ${i+1}" title="Namen klicken zum Umbenennen">
        <div class="scnt" id="sc${i}">0 Seiten</div>
      </div>
      <button class="sclear" onclick="clearSlot(${i})" title="Gruppe leeren">✕</button>
      <button class="sdl" id="sdl${i}" onclick="dlOne(${i})" disabled>⬇</button>
    </div>`;
  }
  document.getElementById('slots').innerHTML=h;updateSlots();
}
function updateMeta(){
  const u=pages.filter(p=>asgn[p.n]===undefined).length;
  document.getElementById('fmeta').textContent=`${pages.length} Seiten · ${u} nicht zugeteilt`;
}
function updateBtns(){
  const hasAsgn=!pages.length||!Object.keys(asgn).length;
  const hasDl=!Object.keys(dlStore).length;
  document.getElementById('btnmake').disabled=hasAsgn;
  document.getElementById('btndlall').disabled=hasDl;
  document.getElementById('btnzip').disabled=hasDl;
}

function updateSlots(){
  for(let i=0;i<cnt;i++){
    const k=Object.values(asgn).filter(v=>v===i).length;
    const sc=document.getElementById('sc'+i);if(sc)sc.textContent=k+' Seite'+(k!==1?'n':'');
    const sl=document.getElementById('slot'+i);if(sl)sl.classList.toggle('has',k>0);
    const sd=document.getElementById('sdl'+i);if(sd)sd.disabled=!dlStore[i];
  }
}

function renderGrid(){
  const g=document.getElementById('grid');g.innerHTML='';
  pages.forEach(p=>{
    const a=asgn[p.n],col=a!==undefined?COLORS[a]:null;
    const card=document.createElement('div');
    card.className='pc';card.id='card'+p.n;
    const dots=Array.from({length:cnt},(_,i)=>
      `<div class="cd ${a===i?'on':''}" style="background:${COLORS[i]};--dc:${COLORS[i]}" onclick="doAssign(${p.n},${i})" title="${NAMES[i]}">${i+1}</div>`).join('');
    card.innerHTML=`
      <div class="pt ${col?'on':''}" style="--ac:${col||'transparent'}"
        onmouseenter="pvShow(event,${p.n})" onmousemove="pvMove(event)" onmouseleave="pvHide()">
        <div class="pb">${a!==undefined?a+1:''}</div>
        <img src="${p.sm}" draggable="false">
        <div class="pn">Seite ${p.n}</div>
      </div>
      <div class="dr">${dots}</div>`;
    g.appendChild(card);
  });
}
function updateCard(pn){
  const a=asgn[pn],col=a!==undefined?COLORS[a]:null;
  const card=document.getElementById('card'+pn);if(!card)return;
  const th=card.querySelector('.pt'),bg=card.querySelector('.pb');
  th.className='pt '+(col?'on':'');
  th.style.setProperty('--ac',col||'transparent');
  bg.textContent=a!==undefined?a+1:'';
  card.querySelectorAll('.cd').forEach((d,i)=>d.classList.toggle('on',i===a));
}

function pvShow(e,pn){
  if(!pvEnabled)return;
  const p=pages.find(x=>x.n===pn);if(!p)return;
  document.getElementById('pvimg').src=p.lg;
  document.getElementById('pvlbl').textContent='Seite '+pn;
  const a=asgn[pn],tag=document.getElementById('pvtag');
  if(a!==undefined){tag.style.display='inline';tag.style.background=COLORS[a];tag.textContent=NAMES[a];}
  else{tag.style.display='none';}
  document.getElementById('pv').classList.add('show');pvMove(e);
}
function pvMove(e){
  const pv=document.getElementById('pv'),bx=document.getElementById('pvbox');
  const W=window.innerWidth,H=window.innerHeight,bw=bx.offsetWidth||260,bh=bx.offsetHeight||380;
  let x=e.clientX+20,y=e.clientY-50;
  if(x+bw>W-8)x=e.clientX-bw-20;
  if(y+bh>H-8)y=H-bh-8;if(y<8)y=8;
  pv.style.left=x+'px';pv.style.top=y+'px';
}
function pvHide(){document.getElementById('pv').classList.remove('show');}

async function makePDFs(){
  const btn=document.getElementById('btnmake');
  btn.disabled=true;btn.textContent='⏳ Erstelle…';
  try{
    const {PDFDocument}=PDFLib;
    const src=await PDFDocument.load(rawBytes,{ignoreEncryption:true});
    dlStore={};let made=0;
    for(let i=0;i<cnt;i++){
      const idxs=Object.entries(asgn).filter(([,v])=>v===i).map(([k])=>parseInt(k)-1).sort((a,b)=>a-b);
      if(!idxs.length)continue;
      const nd=await PDFDocument.create();
      const cp=await nd.copyPages(src,idxs);
      cp.forEach(p=>nd.addPage(p));
      dlStore[i]=await nd.save();
      made++;
    }
    btn.textContent='▶ PDFs erstellen';
    updateSlots();updateBtns();
    if(made){
      document.getElementById('btndlall').textContent=`⬇ Alle herunterladen (${made} PDFs)`;
      document.getElementById('btnzip').textContent=`📦 Als ZIP (${made} PDFs)`;
    }
  }catch(err){
    btn.textContent='▶ PDFs erstellen';btn.disabled=false;
    alert('Fehler beim Erstellen: '+err.message);
  }
}

function getSlotName(i){
  const el=document.getElementById('sname'+i);
  const v=el?el.value.trim():'';
  return v||('PDF '+(i+1));
}
function dlOne(idx){const b=dlStore[idx];if(b)triggerDL(b,getSlotName(idx)+'.pdf');}
function dlAll(){
  Object.entries(dlStore).forEach(([i,b],n)=>{
    setTimeout(()=>triggerDL(b,getSlotName(i)+'.pdf'),n*400);
  });
}

// ZIP download
async function dlZip(){
  const btn=document.getElementById('btnzip');
  btn.disabled=true;btn.textContent='📦 Erstelle ZIP…';
  try{
    const files=Object.entries(dlStore).map(([i,b])=>({name:getSlotName(parseInt(i))+'.pdf',data:new Uint8Array(b)}));
    const zip=makeZip(files);
    triggerDL(zip,'PDFs.zip','application/zip');
  }catch(e){alert('ZIP Fehler: '+e.message);}
  btn.disabled=false;
  btn.textContent=`📦 Als ZIP (${Object.keys(dlStore).length} PDFs)`;
}

function makeZip(files){
  const crcTable=new Uint32Array(256);
  for(let i=0;i<256;i++){let c=i;for(let j=0;j<8;j++)c=c&1?0xEDB88320^(c>>>1):c>>>1;crcTable[i]=c;}
  function crc32(buf){let c=0xFFFFFFFF>>>0;for(let i=0;i<buf.length;i++)c=(crcTable[(c^buf[i])&0xFF]^(c>>>8))>>>0;return(c^0xFFFFFFFF)>>>0;}
  function w16(v){return new Uint8Array([v&0xFF,(v>>8)&0xFF]);}
  function w32(v){return new Uint8Array([v&0xFF,(v>>8)&0xFF,(v>>16)&0xFF,(v>>24)&0xFF]);}
  function cat(...a){const t=a.reduce((s,x)=>s+x.length,0),r=new Uint8Array(t);let p=0;a.forEach(x=>{r.set(x,p);p+=x.length;});return r;}
  const enc=new TextEncoder();
  const localParts=[];const cdParts=[];let offset=0;
  for(const {name,data} of files){
    const nb=enc.encode(name);
    const crc=crc32(data);const sz=data.length;
    const lh=cat(new Uint8Array([0x50,0x4B,0x03,0x04]),w16(20),w16(0),w16(0),w16(0),w16(0),w32(crc),w32(sz),w32(sz),w16(nb.length),w16(0),nb);
    const cd=cat(new Uint8Array([0x50,0x4B,0x01,0x02]),w16(20),w16(20),w16(0),w16(0),w16(0),w16(0),w32(crc),w32(sz),w32(sz),w16(nb.length),w16(0),w16(0),w16(0),w16(0),w32(0),w32(offset),nb);
    localParts.push(lh,data);cdParts.push(cd);
    offset+=lh.length+sz;
  }
  const cdData=cat(...cdParts);
  const eocd=cat(new Uint8Array([0x50,0x4B,0x05,0x06]),w16(0),w16(0),w16(files.length),w16(files.length),w32(cdData.length),w32(offset),w16(0));
  return cat(...localParts,cdData,eocd);
}

function triggerDL(bytes,name,mime='application/pdf'){
  const url=URL.createObjectURL(new Blob([bytes],{type:mime}));
  const a=document.createElement('a');a.href=url;a.download=name;
  document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},1500);
}

function doReset(){
  pages=[];asgn={};cnt=3;dlStore={};rawBytes=null;pvHide();history=[];
  hide('editor');hide('loading');show('drop');
  document.getElementById('fi').value='';
  document.getElementById('cval').textContent='3';
  document.getElementById('cminus').disabled=false;
  document.getElementById('cplus').disabled=false;
  document.getElementById('btndlall').textContent='⬇ Alle herunterladen';
  document.getElementById('btnzip').textContent='📦 Als ZIP herunterladen';
  document.getElementById('bar').style.width='0%';
  document.getElementById('zoom').value=180;
  setZoom(180);
}
function show(id){document.getElementById(id).style.display='block';}
function hide(id){document.getElementById(id).style.display='none';}
</script>
